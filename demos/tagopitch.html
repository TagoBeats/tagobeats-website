<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TagoPitch — Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  /* Self-hosted, same files as the main site (avoids a Google Fonts round trip) */
  @font-face {
    font-family: 'Archivo';
    font-style: normal;
    font-weight: 400 800;
    font-display: swap;
    src: url("../fonts/archivo-3babba83.woff2") format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url("../fonts/archivo-4bbe479d.woff2") format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Mono';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("../fonts/archivo-83c0c00d.woff2") format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  /* TagoBeats design tokens (00 Kontext/TagoBeats Branding.md) */
  :root {
    --bg:        #12100E;
    --bg-deep:   #0A0908;
    --surface:   #1A1815;
    --text:      #ECE7DE;
    --text-hi:   #F2EEE6;
    --accent:    #00FDDC;
    --accent-2:  #00D2C4;
    --hairline:  rgba(236, 231, 222, 0.14);
    --dim:       rgba(236, 231, 222, 0.45);
    --faint:     rgba(236, 231, 222, 0.24);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Backdrop = "the DAW behind the plugin". Everything inside #plugin is the real UI. */
  body {
    height: 100vh;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-deep);
    font-family: "Archivo", sans-serif;
    color: var(--text);
  }

  /* ---------- Plugin window: fixed 560 x 360 ---------- */
  #plugin {
    position: relative;
    width: 560px; height: 360px;
    background: var(--bg);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    overflow: hidden;
    user-select: none;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
  }

  /* Ambient teal fog + edge vignette */
  #plugin::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(420px 300px at 108% 118%, rgba(0, 210, 196, 0.14), transparent 62%),
      radial-gradient(340px 240px at -10% -18%, rgba(0, 253, 220, 0.06), transparent 60%),
      radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0, 0, 0, 0.38) 100%);
    pointer-events: none;
    z-index: 2;
  }
  /* Film grain, a notch stronger for texture */
  #plugin::after {
    content: "";
    position: absolute; inset: 0;
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.5"/></svg>');
    opacity: 0.13;
    mix-blend-mode: overlay;
    pointer-events: none;
    z-index: 2;
  }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--hairline);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    position: relative; z-index: 1;
  }
  .wordmark {
    font-weight: 800; font-size: 20px;
    letter-spacing: -0.035em;
    color: var(--text-hi);
    line-height: 0.9;
    white-space: nowrap;
  }
  .preset {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg-deep);
    border: 1px solid var(--hairline);
    border-radius: 5px;
    padding: 3px 4px;
    font-family: "Space Mono", monospace;
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
  }
  .preset button {
    background: none; border: 0; color: var(--dim);
    font: 700 11px "Space Mono", monospace;
    padding: 2px 7px; cursor: pointer;
  }
  .preset button:hover { color: var(--accent); }
  .preset .name {
    min-width: 118px; text-align: center;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text);
  }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-meta {
    font-family: "Space Mono", monospace;
    font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--dim);
    white-space: nowrap;
  }

  #power {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--hairline);
    background: var(--bg-deep);
    color: var(--accent);
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 253, 220, 0.25);
  }
  #power svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
  #plugin.bypassed #power { color: var(--faint); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }

  /* ---------- Control deck ---------- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr auto 64px;
    align-items: center;
    justify-items: center;
    padding: 4px 16px 0 20px;
    position: relative; z-index: 1;
    /* fine dot grid for tactile depth */
    background-image: radial-gradient(rgba(236, 231, 222, 0.05) 1px, transparent 1.2px);
    background-size: 22px 22px;
    background-position: 11px 8px;
    transition: opacity 0.15s;
  }
  #plugin.bypassed main { opacity: 0.35; }

  .knob-unit {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: ns-resize;
    touch-action: none;
  }
  .knob-unit svg { display: block; }
  .knob-label {
    font-family: "Space Mono", monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--dim);
    margin-top: 2px;
  }
  .knob-value {
    font-family: "Space Mono", monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--accent);
    min-height: 18px;
  }
  .knob-unit:hover .knob-label { color: var(--text); }

  /* stacked small knobs (mix over gain) */
  .stack {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .stack .knob-unit { gap: 2px; }
  .stack .knob-value { font-size: 11px; min-height: 14px; }
  .stack .knob-label { font-size: 9.5px; letter-spacing: 0.22em; margin-top: 0; }

  /* knob svg parts (styled here, drawn in JS) */
  .track   { stroke: rgba(236, 231, 222, 0.12); fill: none; }
  .fill    { stroke: var(--accent); fill: none;
             filter: drop-shadow(0 0 5px rgba(0, 253, 220, 0.55)); }
  .face    { stroke: var(--hairline); }
  .bezel   { stroke: rgba(236, 231, 222, 0.22); }
  .tick    { stroke: rgba(236, 231, 222, 0.22); stroke-linecap: round; }
  .pointer { stroke: var(--text-hi); stroke-linecap: round; }
  .detent  { fill: var(--faint); }

  /* ---------- In/Out meters ---------- */
  .meter-unit {
    height: 78%;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .meter-pair {
    flex: 1;
    display: flex; gap: 7px;
  }
  .meter-col {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .meter {
    flex: 1; width: 7px;
    border-radius: 4px;
    background: var(--bg-deep);
    border: 1px solid var(--hairline);
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.6);
    position: relative;
    overflow: hidden;
  }
  .meter .bar {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 0%;
    background: linear-gradient(to top, var(--accent-2), var(--accent));
    box-shadow: 0 0 8px rgba(0, 253, 220, 0.5);
  }
  .meter .peak {
    position: absolute; left: 0; right: 0;
    height: 1.5px; bottom: 0%;
    background: var(--text-hi);
    opacity: 0.8;
  }
  .meter-label {
    font-family: "Space Mono", monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--dim);
  }

  /* ---------- Footer ---------- */
  footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 22px;
    border-top: 1px solid var(--hairline);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    font-family: "Space Mono", monospace;
    font-size: 9.5px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--faint);
    position: relative; z-index: 1;
  }
  footer b { font-weight: 400; color: var(--dim); }
</style>
</head>
<body>

<div id="plugin">
  <header>
    <div class="wordmark">TAGOPITCH</div>
    <div class="preset">
      <button id="prev" title="Previous preset">‹</button>
      <div class="name" id="preset-name">INIT</div>
      <button id="next" title="Next preset">›</button>
    </div>
    <div class="header-right">
      <span class="header-meta">Mono&nbsp;·&nbsp;V1</span>
      <button id="power" title="Bypass">
        <svg viewBox="0 0 24 24"><path d="M12 3v8"/><path d="M6.2 6.2a8 8 0 1 0 11.6 0"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="knob-unit" id="pitch"></div>
    <div class="knob-unit" id="formant"></div>
    <div class="stack">
      <div class="knob-unit" id="mix"></div>
      <div class="knob-unit" id="gain"></div>
    </div>
    <div class="meter-unit">
      <div class="meter-pair">
        <div class="meter-col">
          <div class="meter" id="meter-in"><div class="bar"></div><div class="peak"></div></div>
          <div class="meter-label">In</div>
        </div>
        <div class="meter-col">
          <div class="meter" id="meter-out"><div class="bar"></div><div class="peak"></div></div>
          <div class="meter-label">Out</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>TagoBeats</span>
  </footer>
</div>

<script>
/* Knob: 270-degree sweep, bipolar knobs fill from center detent.
   Vertical drag / wheel / double-click reset. This class is the seed for the
   React port; parameter IDs match the DSP prototype (tagodsp PitchShifter). */

const SWEEP = 270;                       // degrees
const START = -135;                      // pointer angle at min

function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
}
function arcPath(cx, cy, r, a0, a1) {
  if (Math.abs(a1 - a0) < 0.01) return "";
  const [x0, y0] = polar(cx, cy, r, a0);
  const [x1, y1] = polar(cx, cy, r, a1);
  const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
  const swp = a1 > a0 ? 1 : 0;
  return `M ${x0} ${y0} A ${r} ${r} 0 ${large} ${swp} ${x1} ${y1}`;
}

let knobSeq = 0;

class Knob {
  constructor(el, opts) {
    Object.assign(this, {
      min: -12, max: 12, def: 0, step: 0,      // step 0 = continuous
      bipolar: true, size: 118, unit: "st",
      fmt: v => (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v) + " " + this.unit,
    }, opts);
    this.el = el;
    this.value = this.def;
    this.r = this.size / 2 - 7;
    this.build();
    this.bind();
    this.render();
  }

  build() {
    const s = this.size, c = s / 2;
    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width", s); svg.setAttribute("height", s);
    svg.setAttribute("viewBox", `0 0 ${s} ${s}`);

    // hardware look: metal bezel ring + deep domed cap, light from the top
    const gid = `face-g${knobSeq++}`;
    const defs = document.createElementNS(ns, "defs");
    defs.innerHTML =
      `<radialGradient id="${gid}-deep" cx="0.5" cy="0.28" r="0.9">` +
      `<stop offset="0" stop-color="#2E2921"/><stop offset="0.45" stop-color="#1C1916"/>` +
      `<stop offset="0.85" stop-color="#0E0C0B"/><stop offset="1" stop-color="#080707"/>` +
      `</radialGradient>` +
      `<linearGradient id="${gid}-bezel" x1="0" y1="0" x2="0" y2="1">` +
      `<stop offset="0" stop-color="#3A352C"/><stop offset="0.5" stop-color="#15130F"/>` +
      `<stop offset="1" stop-color="#2A261F"/>` +
      `</linearGradient>`;
    svg.appendChild(defs);

    const mk = (tag, cls) => {
      const n = document.createElementNS(ns, tag);
      n.setAttribute("class", cls);
      svg.appendChild(n);
      return n;
    };

    // outer scale ticks (fewer on small knobs)
    const small = this.size < 80;
    const nTicks = small ? 12 : 24;
    for (let i = 0; i <= nTicks; i++) {
      const ang = START + (i / nTicks) * SWEEP;
      const major = i % (nTicks / 4) === 0;
      const [tx0, ty0] = polar(c, c, this.r + (major ? 1 : 2), ang);
      const [tx1, ty1] = polar(c, c, this.r + 5, ang);
      const t = mk("line", "tick");
      t.setAttribute("x1", tx0); t.setAttribute("y1", ty0);
      t.setAttribute("x2", tx1); t.setAttribute("y2", ty1);
      t.setAttribute("stroke-width", major ? 1.6 : 1);
    }

    this.track = mk("path", "track");
    this.track.setAttribute("d", arcPath(c, c, this.r, START, START + SWEEP));
    this.track.setAttribute("stroke-width", 3);

    this.fillArc = mk("path", "fill");
    this.fillArc.setAttribute("stroke-width", 3);

    const bezel = mk("circle", "bezel");
    bezel.setAttribute("cx", c); bezel.setAttribute("cy", c);
    bezel.setAttribute("r", this.r * 0.85);
    bezel.setAttribute("fill", `url(#${gid}-bezel)`);
    bezel.setAttribute("stroke-width", 1);

    this.faceEl = mk("circle", "face");
    this.faceEl.setAttribute("cx", c); this.faceEl.setAttribute("cy", c);
    this.faceEl.setAttribute("r", this.r * 0.72);
    this.faceEl.setAttribute("fill", `url(#${gid}-deep)`);

    if (this.bipolar) {                   // center detent marker
      const d = mk("circle", "detent");
      const [dx, dy] = polar(c, c, this.r, 0);
      d.setAttribute("cx", dx); d.setAttribute("cy", dy - 4);
      d.setAttribute("r", 1.6);
    }

    this.pointerEl = mk("line", "pointer");
    this.pointerEl.setAttribute("stroke-width", small ? 3 : 4);

    const label = document.createElement("div");
    label.className = "knob-value";
    this.valueEl = label;

    const name = document.createElement("div");
    name.className = "knob-label";
    name.textContent = this.el.id;

    this.el.append(svg, label, name);
  }

  norm() { return (this.value - this.min) / (this.max - this.min); }

  set(v, fine) {
    v = Math.min(this.max, Math.max(this.min, v));
    if (this.step && !fine) v = Math.round(v / this.step) * this.step;
    v = Math.round(v * 100) / 100;
    if (v !== this.value) { this.value = v; this.render(); }
  }

  render() {
    const c = this.size / 2;
    const ang = START + this.norm() * SWEEP;
    const from = this.bipolar ? 0 : START;   // bipolar fills from 12 o'clock
    this.fillArc.setAttribute("d", arcPath(c, c, this.r, Math.min(from, ang), Math.max(from, ang)));
    const [x0, y0] = polar(c, c, this.r * 0.42, ang);
    const [x1, y1] = polar(c, c, this.r * 0.70, ang);
    this.pointerEl.setAttribute("x1", x0); this.pointerEl.setAttribute("y1", y0);
    this.pointerEl.setAttribute("x2", x1); this.pointerEl.setAttribute("y2", y1);
    this.valueEl.textContent = this.fmt(this.value);
  }

  bind() {
    let startY = 0, startVal = 0;
    const range = this.max - this.min;

    this.el.addEventListener("pointerdown", e => {
      startY = e.clientY; startVal = this.value;
      this.el.setPointerCapture(e.pointerId);
      const move = ev => {
        const fine = ev.shiftKey;
        const px = fine ? 900 : 220;         // pixels for full sweep
        this.set(startVal + (startY - ev.clientY) * range / px, fine);
      };
      const up = () => {
        this.el.removeEventListener("pointermove", move);
        this.el.removeEventListener("pointerup", up);
      };
      this.el.addEventListener("pointermove", move);
      this.el.addEventListener("pointerup", up);
    });

    this.el.addEventListener("dblclick", () => { this.value = this.def; this.render(); });

    this.el.addEventListener("wheel", e => {
      e.preventDefault();
      const fine = e.shiftKey;
      const inc = this.step || range / 48;
      this.set(this.value - Math.sign(e.deltaY) * (fine ? inc / 4 : inc), fine);
    }, { passive: false });
  }
}

/* Parameter set = v1 DSP prototype (pitch_semitones, formant_semitones, mix) */
const knobs = {
  pitch: new Knob(document.getElementById("pitch"), { min: -12, max: 12, def: 0, step: 1, unit: "st", size: 118 }),
  formant: new Knob(document.getElementById("formant"), { min: -12, max: 12, def: 0, step: 0, unit: "st", size: 118,
    fmt: v => (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v).toFixed(1) + " st" }),
  mix: new Knob(document.getElementById("mix"), { min: 0, max: 100, def: 100, step: 0, size: 64,
    bipolar: false, unit: "%", fmt: v => Math.round(v) + " %" }),
  gain: new Knob(document.getElementById("gain"), { min: -18, max: 18, def: 0, step: 0, size: 64, unit: "dB",
    fmt: v => (v > 0 ? "+" : v < 0 ? "−" : "") + Math.abs(v).toFixed(1) + " dB" }),
};

/* Presets: name -> knob values. Placeholder set for the mockup. */
const PRESETS = [
  ["INIT",        { pitch: 0,   formant: 0,  mix: 100, gain: 0 }],
  ["OCTAVE UP",   { pitch: 12,  formant: 0,  mix: 50,  gain: 0 }],
  ["DEEP VOICE",  { pitch: -12, formant: -2, mix: 100, gain: -4 }],
  ["DOUBLER",     { pitch: 0,   formant: 3,  mix: 45,  gain: 0 }],
];
let presetIdx = 0;
function applyPreset(i) {
  presetIdx = (i + PRESETS.length) % PRESETS.length;
  const [name, vals] = PRESETS[presetIdx];
  document.getElementById("preset-name").textContent = name;
  for (const [k, v] of Object.entries(vals)) { knobs[k].value = v; knobs[k].render(); }
}
document.getElementById("prev").addEventListener("click", () => applyPreset(presetIdx - 1));
document.getElementById("next").addEventListener("click", () => applyPreset(presetIdx + 1));

/* Bypass */
const plugin = document.getElementById("plugin");
document.getElementById("power").addEventListener("click", () => plugin.classList.toggle("bypassed"));

/* In/Out meters: idle animation for the mockup (random walk, peak hold).
   Out follows In plus the gain knob, so the knob's effect is visible.
   In the real plugin both are fed from the audio thread. */
function makeMeter(sel) {
  const root = document.querySelector(sel);
  return { bar: root.querySelector(".bar"), peakEl: root.querySelector(".peak"), peak: 0, age: 0 };
}
function drawMeter(m, shown) {
  m.bar.style.height = (shown * 100).toFixed(1) + "%";
  if (shown >= m.peak) { m.peak = shown; m.age = 0; }
  else if (++m.age > 90) { m.peak *= 0.985; }
  m.peakEl.style.bottom = (m.peak * 100).toFixed(1) + "%";
}
const meterIn = makeMeter("#meter-in");
const meterOut = makeMeter("#meter-out");
let lvl = 0.4;
function meterTick() {
  lvl += (0.35 + 0.35 * Math.random() - lvl) * 0.07;
  const inShown = Math.max(0, lvl + 0.06 * Math.sin(Date.now() / 230));
  drawMeter(meterIn, inShown);
  const gainFactor = plugin.classList.contains("bypassed") ? 1 : Math.pow(10, knobs.gain.value / 20 * 0.5);
  drawMeter(meterOut, Math.min(1, inShown * gainFactor));
  requestAnimationFrame(meterTick);
}
meterTick();

function fitToViewport() {
  const scale = Math.min(window.innerWidth / 560, window.innerHeight / 360) * 0.94;
  plugin.style.transform = `scale(${scale})`;
}
window.addEventListener("resize", fitToViewport);
fitToViewport();
</script>
</body>
</html>
