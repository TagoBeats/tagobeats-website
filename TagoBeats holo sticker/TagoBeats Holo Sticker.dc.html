<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  html,body { margin:0; }
  @keyframes holoDrift { 0%{filter:hue-rotate(0deg) saturate(1.2);} 50%{filter:hue-rotate(30deg) saturate(1.4);} 100%{filter:hue-rotate(0deg) saturate(1.2);} }
</style>
</helmet>

<div style="position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0b0e;overflow:hidden;font-family:'JetBrains Mono',monospace">

  <!-- ambient studio backdrop -->
  <div style="position:absolute;inset:0;background:url('assets/studio.jpg') center/cover no-repeat;filter:blur(34px) brightness(.32) saturate(1.1);transform:scale(1.15)"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 42%,rgba(10,11,14,.25),rgba(6,7,9,.85) 78%)"></div>

  <!-- =================== CIRCLE BADGE (Variant A) =================== -->
  <div onPointerMove="{{ onMove }}" onPointerLeave="{{ onLeave }}" style="--mx:0.5;--my:0.5;position:relative;width:440px;height:440px;border-radius:50%;transform-style:preserve-3d;transform:perspective(1100px) rotateX(calc((0.5 - var(--my)) * 16deg)) rotateY(calc((var(--mx) - 0.5) * 16deg));transition:transform .12s ease-out;filter:drop-shadow(0 26px 40px rgba(0,0,0,.55));cursor:pointer">

    <!-- die-cut white border + photo base -->
    <div style="position:absolute;inset:0;border-radius:50%;background:#0a0b0e;border:11px solid #f4f5f7;box-shadow:inset 0 0 0 2px #2c2f36, inset 0 8px 40px rgba(0,0,0,.5);overflow:hidden">
      <!-- studio photo -->
      <div style="position:absolute;inset:0;background:url('assets/studio.jpg') center/cover no-repeat"></div>
      <!-- legibility darkening -->
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 46%,rgba(8,9,12,.45),rgba(8,9,12,.82) 80%)"></div>
      <!-- subtle holo rainbow -->
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(118deg,#ff5b8a 0%,#ffb06b 9%,#ffe98a 18%,#7df0ae 27%,#7fdcff 36%,#8e9bff 45%,#d18aff 54%,#ff5b8a 63%);background-size:240% 240%;background-position:calc(var(--mx)*100%) calc(var(--my)*100%);mix-blend-mode:screen;opacity:.26;animation:holoDrift 11s ease-in-out infinite"></div>
      <!-- fine diffraction stripes -->
      <div style="position:absolute;inset:0;background:repeating-linear-gradient(78deg,rgba(255,255,255,.10) 0px,rgba(255,255,255,.10) 1px,transparent 2px,transparent 6px);background-position:calc(var(--mx)*40%) 0;mix-blend-mode:overlay;opacity:.4"></div>
      <!-- specular hotspot -->
      <div style="position:absolute;inset:0;background:radial-gradient(circle at calc(var(--mx)*100%) calc(var(--my)*100%),rgba(255,255,255,.55),rgba(255,255,255,.08) 24%,transparent 46%);mix-blend-mode:screen;opacity:.85"></div>
    </div>

    <!-- curved ring text -->
    <svg viewBox="0 0 440 440" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
      <defs>
        <path id="ringTop" d="M 46,220 A 174,174 0 0 1 394,220" fill="none"></path>
        <path id="ringBot" d="M 394,220 A 174,174 0 0 1 46,220" fill="none"></path>
      </defs>
      <text style="font:700 13px 'JetBrains Mono',monospace;letter-spacing:2px;fill:rgba(255,255,255,.92)"><textPath href="#ringTop" startOffset="50%" text-anchor="middle">IG: @TagoBeats · music@tagobeats.com</textPath></text>
    </svg>

    <!-- inner dashed ring -->
    <div style="position:absolute;inset:48px;border-radius:50%;border:1.5px dashed rgba(255,255,255,.32)"></div>

    <!-- center content -->
    <div style="position:absolute;inset:0;display:flex;justify-content:center;align-items:center;transform:translateZ(24px)">
      <div style="transform:translateY(54px);display:flex;align-items:center;gap:14px;font:700 20px 'JetBrains Mono',monospace;letter-spacing:4px;color:#fff;text-transform:uppercase;filter:drop-shadow(0 2px 4px rgba(0,0,0,.7))">
        <span style="width:26px;height:1px;background:rgba(255,255,255,.55)"></span>TAGOBEATS<span style="width:26px;height:1px;background:rgba(255,255,255,.55)"></span>
      </div>
    </div>
    <!-- horizontal web banner (second eye-catcher, interrupts the ring) -->
    <div style="position:absolute;left:0;right:0;bottom:42px;display:flex;justify-content:center;transform:translateZ(28px);pointer-events:none">
      <div style="font:700 13px 'JetBrains Mono',monospace;letter-spacing:2px;color:#fff;filter:drop-shadow(0 2px 6px rgba(0,0,0,.95)) drop-shadow(0 0 2px rgba(0,0,0,.8))">tagobeats.com</div>
    </div>

  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const onMove = (e) => {
      const el = e.currentTarget;
      const r = el.getBoundingClientRect();
      const x = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
      const y = Math.min(1, Math.max(0, (e.clientY - r.top) / r.height));
      el.style.setProperty('--mx', x.toFixed(3));
      el.style.setProperty('--my', y.toFixed(3));
    };
    const onLeave = (e) => {
      const el = e.currentTarget;
      el.style.setProperty('--mx', '0.5');
      el.style.setProperty('--my', '0.5');
    };
    return { onMove, onLeave };
  }
}
</script>
</body>
</html>
